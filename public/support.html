<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ArmPal Contact Support</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #0a0a0d;
        color: #f3f5f7;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      }
      .page {
        width: 100%;
        max-width: 760px;
        margin: 0 auto;
        padding: calc(16px + env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom));
      }
      .card {
        background: #14151a;
        border: 1px solid #2b2d34;
        border-radius: 14px;
        padding: 18px;
        font-size: 14px;
        line-height: 1.7;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 24px;
        font-weight: 800;
        text-align: center;
      }
      p {
        margin: 8px 0 0;
      }
      .email {
        display: inline-block;
        margin-top: 10px;
        color: #f3f5f7;
        text-decoration: underline;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1>Contact Support</h1>
      <section class="card">
        <p>For support, contact us at:</p>
        <a class="email" href="mailto:support@armpal.net">support@armpal.net</a>
      </section>
    </main>
  </body>
</html>
